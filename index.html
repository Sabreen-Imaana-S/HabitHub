<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitHub - Login / Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="container auth-container">
    <div class="card auth-card">
      <h1>HabitHub</h1>
      <div class="tabs">
        <button id="loginTab" class="tab active">Login</button>
        <button id="signupTab" class="tab">Signup</button>
      </div>

      <form id="loginForm" class="form" novalidate>
        <p class="message" id="loginMessage"></p>
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="Your password" minlength="4" />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <form id="signupForm" class="form hidden" novalidate>
        <p class="message" id="signupMessage"></p>
        <div class="input-group">
          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" required placeholder="Your name" />
        </div>
        <div class="input-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required placeholder="Min 4 characters" minlength="4" />
        </div>
        <button type="submit" class="btn btn-secondary">Signup</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
